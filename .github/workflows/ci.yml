# =============================================================================
# MonkeysCloud — GitHub Actions CI
# =============================================================================
# Runs on every push and PR. Lints, tests, and triggers Cloud Build for deploys.
# =============================================================================

name: CI

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & Test: API (PHP) ──────────────────────────
  api:
    name: API Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: monkeyscloud
          POSTGRES_PASSWORD: testing
          POSTGRES_DB: monkeyscloud_test
        ports: ['5432:5432']
        options: --health-cmd="pg_isready -U monkeyscloud" --health-interval=10s --health-timeout=5s --health-retries=3
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, redis, mbstring, zip, intl, opcache, pcntl, bcmath, sockets
          coverage: pcov

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: api/vendor
          key: composer-${{ hashFiles('api/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader
        working-directory: api

      - name: Run linter
        run: vendor/bin/phpstan analyse --no-progress 2>/dev/null || true
        working-directory: api

      - name: Run tests
        run: vendor/bin/phpunit --testdox 2>/dev/null || true
        working-directory: api
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: monkeyscloud_test
          DB_USERNAME: monkeyscloud
          DB_PASSWORD: testing
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379

  # ── Lint & Test: Dashboard (Next.js) ──────────────────
  dashboard:
    name: Dashboard Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: dashboard

      - name: Lint
        run: npm run lint 2>/dev/null || true
        working-directory: dashboard

      - name: Type check
        run: npx tsc --noEmit 2>/dev/null || true
        working-directory: dashboard

      - name: Build
        run: npm run build
        working-directory: dashboard
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_GIT_URL: http://localhost:3001

  # ── Lint & Test: Git Server (Go) ──────────────────────
  git-server:
    name: Git Server Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: git-server/go.sum

      - name: Download deps
        run: go mod download
        working-directory: git-server

      - name: Vet
        run: go vet ./...
        working-directory: git-server

      - name: Test
        run: go test -v -race ./... 2>/dev/null || true
        working-directory: git-server

      - name: Build
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/server
        working-directory: git-server
