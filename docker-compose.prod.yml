services:
  caddy_proxy:
    image: caddy:2.8-alpine
    container_name: monkeyscloud-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - monkeyscloud-network
    depends_on:
      - dashboard
      - api
      - socket-server
      - git-server

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard/Dockerfile
    container_name: monkeyscloud-dashboard
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=https://api.monkeys.cloud
      - NEXT_PUBLIC_SOCKET_URL=https://ws.monkeys.cloud
    networks:
      - monkeyscloud-network

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: monkeyscloud-api
    restart: unless-stopped
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=production
      - GIT_SERVER_URL=http://git-server:8080
      - GIT_SERVER_PUBLIC_URL=https://git.monkeys.cloud
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgres://monkeyscloud:monkeyscloud@postgres:5432/monkeyscloud
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=monkeyscloud
      - DB_USERNAME=monkeyscloud
      - DB_PASSWORD=monkeyscloud
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - SOCKET_SERVER_URL=http://socket-server:3000
    networks:
      - monkeyscloud-network
    depends_on:
      - postgres
      - redis
      - rabbitmq

  socket-server:
    build:
      context: .
      dockerfile: docker/websocket/Dockerfile
    container_name: monkeyscloud-socket
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - API_URL=http://api:80
      - REDIS_URL=redis://redis:6379
    networks:
      - monkeyscloud-network
    depends_on:
      - redis

  git-server:
    build:
      context: .
      dockerfile: docker/git-server/Dockerfile
    container_name: monkeyscloud-git
    restart: unless-stopped
    ports:
      - "2222:2222" # Expose SSH publicly for Git clone over SSH
    volumes:
      - /mnt/git-data:/var/lib/git # Mount the dedicated SSD here!
    environment:
      - API_URL=http://api:80
    networks:
      - monkeyscloud-network

  postgres:
    image: postgres:16-alpine
    container_name: monkeyscloud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: monkeyscloud
      POSTGRES_USER: monkeyscloud
      POSTGRES_PASSWORD: monkeyscloud
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - monkeyscloud-network

  redis:
    image: redis:7-alpine
    container_name: monkeyscloud-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - monkeyscloud-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: monkeyscloud-rabbitmq
    restart: unless-stopped
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - monkeyscloud-network

networks:
  monkeyscloud-network:
    external: true

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  rabbitmq_data:
