# =============================================================================
# MonkeysCloud — API Secrets (Production)
# =============================================================================
# WARNING: This is a template. Real secrets should be managed via:
#   - Google Secret Manager + External Secrets Operator
#   - sealed-secrets
#   - Kubectl: kubectl create secret generic api-secrets --from-env-file=.env.prod
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
  namespace: monkeyscloud-production
  labels:
    app: api
    environment: production
type: Opaque
stringData:
  DB_USERNAME: "monkeyscloud"
  DB_PASSWORD: ""           # From Terraform: google_sql_user.app.password
  JWT_SECRET: ""            # Generate: openssl rand -base64 64
  MINIO_ROOT_USER: ""       # From GCS service account
  MINIO_ROOT_PASSWORD: ""   # From GCS service account key
  VERTEX_AI_API_KEY: ""     # From GCP console
  MAIL_USERNAME: ""         # Mailgun credentials
  MAIL_PASSWORD: ""         # Mailgun credentials
  WEBHOOK_SIGNING_KEY: ""   # Generate: openssl rand -hex 32
