# =============================================================================
# MonkeysCloud — Git Server ConfigMap + Secrets (Production)
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: git-config
  namespace: monkeyscloud-production
  labels:
    app: git-server
    environment: production
data:
  GIT_HTTP_PORT: "3001"
  GIT_GRPC_PORT: "50051"
  GIT_REPOS_PATH: "/var/lib/git"
  PLATFORM_API_URL: "http://api:8000"
  REDIS_HOST: ""     # Memorystore IP
  REDIS_PORT: "6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: git-secrets
  namespace: monkeyscloud-production
  labels:
    app: git-server
    environment: production
type: Opaque
stringData:
  PLATFORM_API_TOKEN: ""  # Internal service token
