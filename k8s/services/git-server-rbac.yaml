apiVersion: v1
kind: ServiceAccount
metadata:
  name: git-server
  namespace: monkeyscloud
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: git-server-scaffold
  namespace: monkeyscloud
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: git-server-scaffold
  namespace: monkeyscloud
subjects:
  - kind: ServiceAccount
    name: git-server
    namespace: monkeyscloud
roleRef:
  kind: Role
  name: git-server-scaffold
  apiGroup: rbac.authorization.k8s.io
