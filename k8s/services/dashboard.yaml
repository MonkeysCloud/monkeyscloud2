apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: monkeyscloud
  labels:
    app: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_API_URL
              value: https://api.monkeys.cloud
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            tcpSocket:
              port: 3000
            failureThreshold: 12
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 3000
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            periodSeconds: 30
---
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: dashboard-backend-config
  namespace: monkeyscloud
spec:
  healthCheck:
    checkIntervalSec: 15
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 3
    type: HTTP
    port: 3000
    requestPath: /
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: monkeyscloud
  annotations:
    cloud.google.com/backend-config: '{"default": "dashboard-backend-config"}'
spec:
  selector:
    app: dashboard
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
