# =============================================================================
# MonkeysCloud Queue Worker — GKE Deployment
# Runs `php ml queue:work` to process background jobs (e.g. project deletion).
# Uses the same API image so it has access to all app code and config.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue-worker
  namespace: monkeyscloud-system
  labels:
    app: queue-worker
    app.kubernetes.io/name: monkeyscloud-queue
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: queue-worker
  template:
    metadata:
      labels:
        app: queue-worker
    spec:
      containers:
        - name: queue-worker
          image: REGION-docker.pkg.dev/PROJECT/mc-platform/api:latest
          command: ["php", "ml", "queue:work", "--queue=default", "--sleep=3", "--tries=3", "--memory=256"]
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: api-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
