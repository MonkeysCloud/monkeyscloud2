# =============================================================================
# MonkeysCloud — Ingress (GKE)
# =============================================================================
# Routes traffic to the correct service based on hostname:
#   monkeys.cloud        → Dashboard service (main site)
#   api.monkeys.cloud    → API service
#   git.monkeys.cloud    → Git server service
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monkeyscloud-ingress
  namespace: monkeyscloud-system
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    # Enable WebSocket for dashboard HMR and SSE for build logs
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  tls:
    - hosts:
        - monkeys.cloud
        - api.monkeys.cloud
        - git.monkeys.cloud
      secretName: monkeyscloud-tls
  rules:
    # API
    - host: api.monkeys.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000

    # Dashboard (main site)
    - host: monkeys.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard
                port:
                  number: 3000

    # Git Server
    - host: git.monkeys.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: git-server
                port:
                  number: 3001
