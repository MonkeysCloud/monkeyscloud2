# =============================================================================
# MonkeysCloud — Network Policies (Tenant Isolation)
# =============================================================================

# Default deny all ingress/egress for customer namespaces
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: monkeyscloud-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Allow platform services to communicate with each other
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-platform-internal
  namespace: monkeyscloud-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: monkeyscloud-platform
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: monkeyscloud
        - podSelector: {}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: monkeyscloud
        - podSelector: {}
    # Allow DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow external HTTPS (Vertex AI, Stripe, etc.)
    - to: []
      ports:
        - protocol: TCP
          port: 443

---
# Allow ingress from load balancer
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-controller
  namespace: monkeyscloud-system
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [api, dashboard, git-server]
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 3001
