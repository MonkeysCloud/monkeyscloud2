# =============================================================================
# MonkeysCloud — Kustomize Base
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monkeyscloud-system

resources:
  - namespace.yaml
  - api.yaml
  - dashboard.yaml
  - git-server.yaml
  - cicd-worker.yaml
  - queue-worker.yaml
  - ingress.yaml
  - network-policies.yaml

commonLabels:
  app.kubernetes.io/part-of: monkeyscloud-platform
  app.kubernetes.io/managed-by: kustomize
