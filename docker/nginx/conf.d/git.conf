# =============================================================================
# MonkeysCloud Git Server — Reverse Proxy
# Route: *.git/* (Git Smart HTTP Protocol)
# =============================================================================

server {
    listen 80;
    server_name git.localhost;

    # Git Smart HTTP Protocol
    # Handles: /{org}/{project}.git/info/refs
    #          /{org}/{project}.git/git-upload-pack
    #          /{org}/{project}.git/git-receive-pack
    location ~ ^/(.+)\.git/ {
        proxy_pass http://git_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Git push can send large payloads
        client_max_body_size 500M;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Disable buffering for git protocol
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Git server health
    location /health {
        proxy_pass http://git_backend/health;
    }
}
